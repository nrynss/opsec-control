name: ci

# Linux is the great equalizer: green here = green everywhere (SPEC §19.3).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    name: Go (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Uses the toolchain pinned in go.mod (SPEC §19.1).
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (incl. contract suite, §0.6)
        run: go test ./...

  docker:
    name: Docker build (build authority, §19.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -t opsec-control:ci .
