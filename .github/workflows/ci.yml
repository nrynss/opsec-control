name: ci

# Linux is the great equalizer: green here = green everywhere (SPEC §19.3).
on:
  push:
    branches: [main]
    # Skip CI for docs/text-only changes. A commit that ALSO touches code still
    # runs the full pipeline — runs are skipped only when EVERY changed path
    # matches one of these patterns.
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.txt"
      - "LICENSE"
  workflow_dispatch: # manual "Run workflow" button (deploy on demand)

jobs:
  go:
    name: Go (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          # Uses the toolchain pinned in go.mod (SPEC §19.1).
          go-version-file: go.mod

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (incl. contract suite, §0.6)
        run: go test ./...

  race:
    name: Go race detector (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      # The race detector needs cgo (a C toolchain), which ubuntu-latest has but
      # Windows builders don't — so this is the authority for concurrency bugs
      # across every lane (event bus, orchestrator fan-out, websocket writers).
      - name: test -race
        run: go test -race ./...

  docker:
    name: Docker build (build authority, §19.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker build
        run: docker build -t opsec-control:ci .

  deploy:
    name: Deploy to Fly.io
    needs: [go, race, docker] # never deploy a red build
    # Deploy ONLY on a merge/push to main or via the manual "Run workflow" button —
    # never on pull_request. Each deploy restarts the single Fly machine, which
    # resets in-memory world state + restarts the scenario replay, so this is gated
    # deliberately (see HANDOFF "single-instance rule" + hosting.md §4).
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    concurrency:
      group: fly-deploy
      cancel-in-progress: false # let an in-flight deploy finish; don't interleave
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: fly deploy (no HA second machine — single-instance rule)
        run: flyctl deploy --remote-only --ha=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: enforce single instance (belt-and-suspenders)
        run: flyctl scale count 1 -y
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
