# Fly.io deployment for the Cerebro EOC single-origin container.
# See hosting.md §4 for the full deploy guide. Key constraints:
#   - SINGLE INSTANCE ONLY: world state is in-memory + the scenario replays
#     per-process, so run exactly one machine (`fly scale count 1`).
#   - Never auto-stop: long-lived WebSockets must not be idled.
app = "cerebro-eoc"          # must be globally unique; change if taken
primary_region = "iad"       # US-East, near Cerebras/OpenRouter — low fan-out latency

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  WEB_DIR = "/web/dist"
  CEREBRAS_MODEL = "gemma-4-31b"
  OPENROUTER_MODEL = "google/gemma-4-31b-it"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false   # never idle the box — would drop live WebSockets
  auto_start_machines = true
  min_machines_running = 1      # always one instance warm

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250            # long-lived WS connections count here — keep generous

  [[http_service.checks]]
    method = "GET"
    path = "/state"            # returns 200 once the server is up
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

[[restart]]
  policy = "always"            # single-instance resilience = self-heal on crash

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"             # Go + many WS clients; 256mb is tight
